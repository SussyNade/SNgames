<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Testador de iframe - SNGames</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: white; font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: #16213e; padding: 12px 16px; display: flex; gap: 10px; align-items: center; }
    .topbar input { flex: 1; padding: 8px 14px; border-radius: 6px; border: none; background: #0f3460; color: white; font-size: 14px; outline: none; }
    .topbar button { padding: 8px 18px; border-radius: 6px; border: none; background: #e94560; color: white; font-size: 14px; cursor: pointer; }
    .topbar button:hover { background: #c73652; }
    .status { padding: 10px 16px; font-size: 13px; background: #0f3460; }
    .frame-area { flex: 1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; background: #1a1a2e; }
    .overlay p { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="topbar">
    <input type="text" id="urlInput" placeholder="Cole a URL aqui... ex: https://krunker.io" onkeydown="if(event.key==='Enter') testar()">
    <button onclick="testar()">Testar iframe</button>
    <button onclick="resultado('iframe')" style="background:#2ecc71">✓ Funciona</button>
    <button onclick="resultado('external')" style="background:#e67e22">✗ Não funciona</button>
  </div>
  <div class="status" id="status">Digite uma URL e clique em "Testar iframe"</div>
  <div class="frame-area">
    <div class="overlay" id="overlay">
      <p>Nenhuma URL testada ainda</p>
    </div>
    <iframe id="frame" src=""></iframe>
  </div>

  <script>
    function testar() {
      const url = document.getElementById('urlInput').value.trim();
      if (!url) return;
      document.getElementById('status').textContent = 'Testando: ' + url + ' — Se aparecer o site abaixo = iframe OK. Se der erro do Firefox = external.';
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('frame').src = url;
    }

    function resultado(tipo) {
      const url = document.getElementById('urlInput').value.trim();
      if (!tipo || !url) return;
      alert(`Resultado para ${url}:\ntype = "${tipo}"\n\nAnote isso no index.html!`);
    }
  </script>
</body>
</html>
